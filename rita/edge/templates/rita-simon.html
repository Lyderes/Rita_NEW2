<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RITA — Juego de Memoria</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background-color: #0b1120;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; padding: 2rem 1rem;
    overflow: hidden;
  }
  .grid-bg { 
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
    z-index: 0;
  }
  #app { 
    position: relative; z-index: 10; 
    background: #1e293b; /* Fondo solido, sin confusiones de cristal */
    border: 2px solid #334155; border-radius: 24px; padding: 2rem; 
    max-width: 440px; width: 100%; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); 
  }
  h1 { text-align: center; font-size: 26px; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
  .subtitle { text-align: center; font-size: 16px; color: #94a3b8; margin-bottom: 1.5rem; }
  
  .back-btn {
    position: absolute; top: 24px; left: 24px; background: #334155;
    border: none; border-radius: 30px; padding: 12px 24px;
    color: #f8fafc; font-weight: 600; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; gap: 8px; z-index: 999;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.2s;
  }
  .back-btn:hover { background: #475569; }
  .back-btn i { color: #cbd5e1; }

  #stats { display: flex; justify-content: space-around; background: #0f172a; border-radius: 16px; padding: 1rem; margin-bottom: 1.5rem; }
  .stat { text-align: center; }
  .stat-label { font-size: 13px; color: #94a3b8; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #ffffff; }
  
  #board { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .btn {
    height: 140px; border: none; border-radius: 20px;
    cursor: pointer; transition: transform 0.1s ease; outline: none; 
    box-shadow: 0 6px 0 rgba(0,0,0,0.4), inset 0 2px 5px rgba(255,255,255,0.2);
  }
  .btn:active { box-shadow: 0 2px 0 rgba(0,0,0,0.4); transform: translateY(4px); }
  
  .btn.dim { filter: brightness(0.6) saturate(0.8); }
  .btn.lit { filter: brightness(1.3) saturate(1.1); transform: scale(0.97); box-shadow: 0 2px 0 rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.4); }
  
  #b-red    { background: #ef4444; }
  #b-green  { background: #22c55e; }
  #b-blue   { background: #3b82f6; }
  #b-yellow { background: #eab308; }

  #msg-box {
    min-height: 60px; display: flex; align-items: center; justify-content: center;
    border-radius: 12px; padding: 0.5rem 1rem; margin-bottom: 1.5rem;
    background: #0f172a; border: 2px solid #334155;
  }
  #msg { font-size: 18px; font-weight: 600; color: #e2e8f0; text-align: center; }
  #msg.ok   { color: #4ade80; }
  #msg.fail { color: #f87171; }
  #msg.watch{ color: #60a5fa; }
  
  #start {
    width: 100%; padding: 18px; font-size: 20px; font-weight: 700;
    background: #3b82f6; color: #ffffff; border: none; border-radius: 16px;
    cursor: pointer; transition: background 0.2s;
    box-shadow: 0 4px 0 #2563eb;
  }
  #start:hover { background: #60a5fa; box-shadow: 0 4px 0 #3b82f6; }
  #start:disabled { background: #475569; box-shadow: 0 4px 0 #334155; color: #94a3b8; cursor: not-allowed; }
  
  #history { margin-top: 1.5rem; display: none; }
  #history h3 { font-size: 14px; color: #94a3b8; margin-bottom: 10px; font-weight: 600; }
  #dots { display: flex; flex-wrap: wrap; gap: 8px; }
  .dot {
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 14px; font-weight: 700; color: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }
  .dot.ok   { background: #22c55e; }
  .dot.fail { background: #ef4444; }
  
  #metrics { margin-top: 1.5rem; display: none; background: #0f172a; border-radius: 16px; padding: 1.25rem; border: 2px solid #334155; }
  #metrics h3 { font-size: 14px; color: #60a5fa; margin-bottom: 15px; font-weight: 700; }
  .mrow { display: flex; justify-content: space-between; font-size: 15px; padding: 8px 0; border-bottom: 1px solid #334155; }
  .mrow:last-child { border-bottom: none; }
  .mkey { color: #cbd5e1; }
  .mval { font-weight: 700; color: #f8fafc; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<button class="back-btn" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Volver a RITA</button>
<div id="app">
  <h1><i class="fas fa-brain" style="margin-right: 10px;"></i>RITA MEMORIA</h1>
  <p class="subtitle">Repite la secuencia de láseres</p>

  <div id="stats">
    <div class="stat"><div class="stat-label">Nivel</div><div class="stat-value" id="s-level">—</div></div>
    <div class="stat"><div class="stat-label">Mejor</div><div class="stat-value" id="s-best">—</div></div>
    <div class="stat"><div class="stat-label">Partidas</div><div class="stat-value" id="s-games">0</div></div>
  </div>

  <div id="board">
    <button class="btn dim" id="b-red"    data-c="red"></button>
    <button class="btn dim" id="b-green"  data-c="green"></button>
    <button class="btn dim" id="b-blue"   data-c="blue"></button>
    <button class="btn dim" id="b-yellow" data-c="yellow"></button>
  </div>

  <div id="msg-box"><div id="msg">Pulsa "Empezar" cuando estés lista</div></div>

  <button id="start">Empezar</button>

  <div id="history">
    <h3>Intentos de hoy</h3>
    <div id="dots"></div>
  </div>

  <div id="metrics">
    <h3>Datos cognitivos de la sesión</h3>
    <div class="mrow"><span class="mkey">Secuencia máxima</span><span class="mval" id="m-max">—</span></div>
    <div class="mrow"><span class="mkey">Tiempo medio de respuesta</span><span class="mval" id="m-rt">—</span></div>
    <div class="mrow"><span class="mkey">Errores cometidos</span><span class="mval" id="m-errors">—</span></div>
    <div class="mrow"><span class="mkey">Tendencia</span><span class="mval" id="m-trend">—</span></div>
  </div>
</div>

<script>
const COLORS = ['red','green','blue','yellow'];
let seq = [], pIdx = 0, active = false, waiting = false;
let level = 0, best = 0, games = 0, errors = 0;
let rts = [], stepTime = 0, history = [];

const btns = {};
COLORS.forEach(c => btns[c] = document.getElementById('b-' + c));
const msgEl    = document.getElementById('msg');
const startBtn = document.getElementById('start');
const sLevel   = document.getElementById('s-level');
const sBest    = document.getElementById('s-best');
const sGames   = document.getElementById('s-games');
const histEl   = document.getElementById('history');
const dotsEl   = document.getElementById('dots');
const metricsEl= document.getElementById('metrics');

function setMsg(t, cls) { msgEl.textContent = t; msgEl.className = cls || ''; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function dimAll() { COLORS.forEach(c => { btns[c].classList.add('dim'); btns[c].classList.remove('lit'); }); }
function enableAll(yes) { COLORS.forEach(c => btns[c].disabled = !yes); }

function flashBtn(color, dur) {
  return new Promise(res => {
    const b = btns[color];
    b.classList.remove('dim'); b.classList.add('lit');
    setTimeout(() => { b.classList.remove('lit'); b.classList.add('dim'); setTimeout(res, 100); }, dur);
  });
}

async function playSeq() {
  waiting = false; enableAll(false); dimAll();
  setMsg('Observa bien...', 'watch');
  await sleep(600);
  const speed = Math.max(280, 650 - level * 25);
  for (const c of seq) { await flashBtn(c, speed); await sleep(100); }
  await sleep(300);
  setMsg('¡Tu turno! Repite la secuencia', '');
  COLORS.forEach(c => btns[c].classList.remove('dim'));
  enableAll(true); waiting = true; pIdx = 0; stepTime = Date.now();
}

async function nextLevel() {
  level++;
  sLevel.textContent = level;
  seq.push(COLORS[Math.floor(Math.random() * 4)]);
  await playSeq();
}

async function startGame() {
  seq = []; pIdx = 0; level = 0; active = true; rts = []; errors = 0;
  startBtn.disabled = true;
  setMsg('Preparando...', '');
  await sleep(400);
  await nextLevel();
}

async function onPlayerClick(color) {
  if (!waiting || !active) return;
  rts.push(Date.now() - stepTime);
  await flashBtn(color, 180);

  if (color !== seq[pIdx]) {
    errors++;
    waiting = false; active = false; enableAll(false); dimAll();
    if (level > best) { best = level; sBest.textContent = best; }
    games++; sGames.textContent = games;
    history.push({ level, ok: false });
    setMsg('¡Vaya! Llegaste al nivel ' + level, 'fail');
    renderHistory(); updateMetrics();
    setTimeout(() => { startBtn.disabled = false; startBtn.textContent = 'Intentarlo de nuevo'; setMsg('Pulsa el botón cuando quieras', ''); }, 2000);
    return;
  }

  pIdx++;
  stepTime = Date.now();

  if (pIdx === seq.length) {
    waiting = false; enableAll(false); dimAll();
    setMsg('¡Perfecto! Nivel ' + level + ' superado', 'ok');
    if (level > best) { best = level; sBest.textContent = best; }
    await sleep(1000);
    if (active) await nextLevel();
  }
}

function renderHistory() {
  histEl.style.display = 'block';
  dotsEl.innerHTML = '';
  history.slice(-20).forEach(h => {
    const d = document.createElement('div');
    d.className = 'dot ' + (h.ok ? 'ok' : 'fail');
    d.title = 'Nivel ' + h.level;
    d.textContent = h.level;
    dotsEl.appendChild(d);
  });
}

function updateMetrics() {
  metricsEl.style.display = 'block';
  document.getElementById('m-max').textContent = best > 0 ? best : '—';
  if (rts.length > 0) {
    const avg = Math.round(rts.reduce((a,b) => a+b, 0) / rts.length);
    document.getElementById('m-rt').textContent = avg + ' ms';
  }
  document.getElementById('m-errors').textContent = errors;
  const wins = history.filter(h => h.ok).length;
  const loses = history.filter(h => !h.ok).length;
  document.getElementById('m-trend').textContent = wins > loses ? '↑ Mejorando' : wins < loses ? '↓ Más errores' : '→ Estable';
}

COLORS.forEach(c => btns[c].addEventListener('click', () => onPlayerClick(c)));
startBtn.addEventListener('click', () => { startBtn.textContent = 'Empezar'; startGame(); });
</script>
</body>
</html>
